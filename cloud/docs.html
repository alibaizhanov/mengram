<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Privacy-friendly analytics by Plausible -->
    <script async src="https://plausible.io/js/pa-0hhr-Yt01J5NdtKDFK9iN.js"></script>
    <script>window.plausible=window.plausible||function(){{(plausible.q=plausible.q||[]).push(arguments)}},plausible.init=plausible.init||function(i){{plausible.o=i||{{}}}};plausible.init()</script>
    <title>{title} — Mengram Docs</title>
    <meta name="description" content="{description}">
    <meta name="keywords" content="mengram, ai memory, {slug}, documentation, api, sdk">
    <meta name="author" content="Ali Baizhanov">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://mengram.io/docs/{slug}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://mengram.io/docs/{slug}">
    <meta property="og:title" content="{title} — Mengram Docs">
    <meta property="og:description" content="{description}">
    <meta property="og:site_name" content="Mengram">
    <meta property="og:image" content="https://opengraph.githubassets.com/1/alibaizhanov/mengram">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{title} — Mengram Docs">
    <meta name="twitter:description" content="{description}">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Cpath d='M60 16 Q92 16 96 48 Q100 78 72 88 Q50 96 38 76 Q26 58 46 46 Q62 38 70 52 Q76 64 62 68' fill='none' stroke='%23a855f7' stroke-width='10' stroke-linecap='round'/%3E%3Ccircle cx='62' cy='68' r='10' fill='%23a855f7'/%3E%3Ccircle cx='62' cy='68' r='4.5' fill='%23fff'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {{
            --bg: #05050a;
            --bg-card: #0a0a14;
            --bg-elevated: #0f0f1a;
            --border: #1a1a2e;
            --border-hover: #2a2a44;
            --text: #e8e8f0;
            --text-2: #9898b0;
            --text-3: #5a5a78;
            --accent: #a855f7;
            --accent-dim: rgba(168, 85, 247, 0.12);
            --accent-glow: rgba(168, 85, 247, 0.25);
            --green: #34d399;
            --green-dim: rgba(52, 211, 153, 0.1);
            --blue: #60a5fa;
            --red: #f87171;
        }}

        * {{ margin: 0; padding: 0; box-sizing: border-box; }}

        body {{
            background: var(--bg);
            color: var(--text);
            font-family: 'Sora', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }}

        body::before {{
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }}

        .glow-orb {{
            position: fixed;
            width: 600px; height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.07;
            pointer-events: none;
            z-index: 0;
        }}
        .glow-orb.purple {{ background: #a855f7; top: -200px; right: -100px; }}
        .glow-orb.blue {{ background: #3b82f6; bottom: -200px; left: -100px; }}

        /* Nav */
        .top-nav {{
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 10;
        }}
        .logo {{
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
            text-decoration: none;
        }}
        .nav-links {{ display: flex; gap: 28px; align-items: center; }}
        .nav-links a {{
            color: var(--text-2);
            text-decoration: none;
            font-size: 14px;
            font-weight: 400;
            transition: color 0.2s;
        }}
        .nav-links a:hover {{ color: var(--text); }}
        .nav-links a.active {{ color: var(--accent); }}

        .btn {{
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            font-family: 'Sora', sans-serif;
        }}
        .btn-ghost {{
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid rgba(168, 85, 247, 0.2);
        }}
        .btn-ghost:hover {{
            background: rgba(168, 85, 247, 0.18);
            border-color: rgba(168, 85, 247, 0.4);
        }}

        /* Layout */
        .docs-layout {{
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            gap: 40px;
            position: relative;
            z-index: 1;
        }}

        /* Sidebar */
        .sidebar {{
            width: 240px;
            flex-shrink: 0;
            position: sticky;
            top: 24px;
            height: fit-content;
            max-height: calc(100vh - 48px);
            overflow-y: auto;
            padding-bottom: 40px;
        }}
        .sidebar-section {{
            margin-bottom: 24px;
        }}
        .sidebar-section h4 {{
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-3);
            margin-bottom: 8px;
            padding: 0 12px;
        }}
        .sidebar a {{
            display: block;
            padding: 7px 12px;
            color: var(--text-2);
            text-decoration: none;
            font-size: 14px;
            border-radius: 6px;
            transition: all 0.15s;
            line-height: 1.4;
        }}
        .sidebar a:hover {{
            color: var(--text);
            background: var(--bg-elevated);
        }}
        .sidebar a.active {{
            color: var(--accent);
            background: var(--accent-dim);
            font-weight: 500;
        }}

        /* Content */
        .doc-content {{
            flex: 1;
            min-width: 0;
            max-width: 820px;
            padding-bottom: 80px;
        }}

        .doc-content .breadcrumb {{
            font-size: 13px;
            color: var(--text-3);
            margin-bottom: 24px;
        }}
        .doc-content .breadcrumb a {{
            color: var(--accent);
            text-decoration: none;
        }}
        .doc-content .breadcrumb a:hover {{ text-decoration: underline; }}

        .doc-content h1 {{
            font-size: clamp(28px, 4vw, 38px);
            font-weight: 800;
            line-height: 1.15;
            letter-spacing: -1.2px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, #c4b5fd 50%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }}
        .doc-content .subtitle {{
            font-size: 16px;
            color: var(--text-2);
            margin-bottom: 32px;
            line-height: 1.6;
        }}

        /* Article body styles */
        .doc-body {{
            line-height: 1.8;
            font-size: 15px;
            color: var(--text-2);
        }}
        .doc-body h2 {{
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin: 40px 0 16px;
            color: var(--text);
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }}
        .doc-body h2:first-child {{
            border-top: none;
            padding-top: 0;
            margin-top: 0;
        }}
        .doc-body h3 {{
            font-size: 17px;
            font-weight: 600;
            margin: 28px 0 10px;
            color: var(--text);
        }}
        .doc-body p {{
            margin-bottom: 16px;
        }}
        .doc-body a {{
            color: var(--accent);
            text-decoration: underline;
            text-underline-offset: 3px;
        }}
        .doc-body a:hover {{ color: #c084fc; }}
        .doc-body strong {{ color: var(--text); font-weight: 600; }}
        .doc-body ul, .doc-body ol {{
            margin: 0 0 16px 24px;
        }}
        .doc-body li {{
            margin-bottom: 8px;
        }}
        .doc-body code {{
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
            color: var(--accent);
        }}
        .doc-body pre {{
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            margin: 12px 0 24px;
            overflow-x: auto;
        }}
        .doc-body pre code {{
            background: none;
            border: none;
            padding: 0;
            font-size: 13px;
            color: var(--text-2);
            line-height: 1.6;
        }}
        .doc-body blockquote {{
            border-left: 3px solid var(--accent);
            padding: 12px 20px;
            margin: 16px 0;
            background: var(--accent-dim);
            border-radius: 0 8px 8px 0;
            color: var(--text-2);
        }}
        .doc-body table {{
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0 24px;
            font-size: 14px;
        }}
        .doc-body th {{
            text-align: left;
            padding: 10px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            font-weight: 600;
            font-size: 13px;
        }}
        .doc-body td {{
            padding: 10px 14px;
            border: 1px solid var(--border);
            color: var(--text-2);
        }}
        .doc-body .tip {{
            padding: 16px 20px;
            background: var(--green-dim);
            border: 1px solid rgba(52, 211, 153, 0.2);
            border-radius: 8px;
            margin: 16px 0;
            font-size: 14px;
        }}
        .doc-body .tip strong {{
            color: var(--green);
        }}

        /* Footer */
        footer {{
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
            text-align: center;
            color: var(--text-3);
            font-size: 13px;
            border-top: 1px solid var(--border);
        }}
        footer a {{
            color: var(--text-3);
            text-decoration: none;
            transition: color 0.2s;
        }}
        footer a:hover {{ color: var(--text-2); }}

        /* Mobile sidebar toggle */
        .sidebar-toggle {{
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            border: none;
            font-size: 20px;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 4px 20px var(--accent-glow);
        }}

        @media (max-width: 768px) {{
            .nav-links .hide-mobile {{ display: none; }}
            .docs-layout {{ flex-direction: column; gap: 0; }}
            .sidebar {{
                width: 100%;
                position: fixed;
                top: 0;
                left: -100%;
                height: 100vh;
                max-height: 100vh;
                background: var(--bg);
                z-index: 99;
                padding: 80px 24px 24px;
                transition: left 0.3s;
                border-right: 1px solid var(--border);
            }}
            .sidebar.open {{ left: 0; }}
            .sidebar-toggle {{ display: flex; align-items: center; justify-content: center; }}
            .doc-content {{ max-width: 100%; }}
        }}
    </style>
</head>
<body>
    <div class="glow-orb purple"></div>
    <div class="glow-orb blue"></div>

    <nav class="top-nav">
        <a class="logo" href="/">
            <svg width="24" height="24" viewBox="0 0 120 120" style="vertical-align:middle;">
                <defs><linearGradient id="nav-eg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#c084fc"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient></defs>
                <path d="M60 16 Q92 16 96 48 Q100 78 72 88 Q50 96 38 76 Q26 58 46 46 Q62 38 70 52 Q76 64 62 68" fill="none" stroke="url(#nav-eg)" stroke-width="8" stroke-linecap="round"/>
                <circle cx="62" cy="68" r="8" fill="#a855f7"/><circle cx="62" cy="68" r="3.5" fill="#fff"/>
            </svg> Mengram
        </a>
        <div class="nav-links">
            <a href="/" class="hide-mobile">Home</a>
            <a href="/docs" class="active">Docs</a>
            <a href="/dashboard">Console</a>
            <a href="https://github.com/alibaizhanov/mengram" class="hide-mobile">GitHub</a>
            <a href="/#signup" class="btn btn-ghost" style="padding:8px 18px; font-size:13px;">Get API Key</a>
        </div>
    </nav>

    <div class="docs-layout">
        <aside class="sidebar" id="sidebar">
            {sidebar_html}
        </aside>

        <main class="doc-content">
            <div class="breadcrumb"><a href="/docs">Docs</a> &rarr; {title}</div>
            <h1>{title}</h1>
            <p class="subtitle">{description}</p>
            <div class="doc-body">
                {content}
            </div>
        </main>
    </div>

    <footer>
        <p>
            Mengram &mdash; human-like memory for AI
            &nbsp;&middot;&nbsp; <a href="/">Home</a>
            &nbsp;&middot;&nbsp; <a href="/docs">Docs</a>
            &nbsp;&middot;&nbsp; <a href="/blog">Blog</a>
            &nbsp;&middot;&nbsp; <a href="https://github.com/alibaizhanov/mengram">GitHub</a>
            &nbsp;&middot;&nbsp; <a href="/terms">Terms</a>
            &nbsp;&middot;&nbsp; <a href="/privacy">Privacy</a>
        </p>
    </footer>

    <button class="sidebar-toggle" id="sidebarToggle" onclick="document.getElementById('sidebar').classList.toggle('open'); this.textContent = document.getElementById('sidebar').classList.contains('open') ? '\u2715' : '\u2630';">&equiv;</button>
</body>
</html>
